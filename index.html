<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>싸칙 포커</title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5322425731380321"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <section id="setup" class="setup-screen">
        <div class="brand-mark" aria-hidden="true">
          <span>7</span>
          <span>×</span>
          <span>?</span>
        </div>
        <h1>싸칙 포커</h1>
        <p>10라운드 동안 숫자와 사칙연산 카드로 식을 만들고, 라운드마다 달라지는 승리룰에 맞춰 코인을 겨루세요.</p>

        <div class="setup-tabs" role="tablist" aria-label="플레이 방식">
          <button id="localTab" class="tab-button active" type="button">한 기기에서</button>
          <button id="onlineTab" class="tab-button" type="button">온라인 방</button>
        </div>

        <div id="localSetup" class="setup-panel">
          <label for="playerCount">플레이어 수</label>
          <select id="playerCount">
            <option value="2">2명</option>
            <option value="3">3명</option>
            <option value="4" selected>4명</option>
          </select>
          <button id="startGame" type="button">로컬 게임 시작</button>
        </div>

        <div id="onlineSetup" class="setup-panel hidden">
          <label for="playerName">내 이름</label>
          <input id="playerName" type="text" maxlength="16" placeholder="플레이어" />
          <div class="button-row">
            <button id="createRoom" type="button">방 만들기</button>
            <button id="joinRoom" type="button" class="secondary">방 참가</button>
          </div>
          <label for="roomCodeInput">방 코드</label>
          <input id="roomCodeInput" type="text" maxlength="6" placeholder="예: A7K2Q9" />
          <p id="firebaseStatus" class="setup-note">Firebase 설정을 확인하는 중입니다.</p>
        </div>

        <aside class="ad-shell hidden" data-ad-placement="setup" aria-label="광고"></aside>
      </section>

      <section id="lobby" class="lobby-screen hidden">
        <header class="lobby-header">
          <div>
            <span class="eyebrow">방 코드</span>
            <strong id="roomCodeLabel" class="room-code">------</strong>
          </div>
          <button id="copyRoomCode" type="button">코드 복사</button>
        </header>
        <div class="lobby-body">
          <div>
            <span class="eyebrow">참가자</span>
            <div id="lobbyPlayers" class="lobby-players"></div>
          </div>
          <div class="lobby-actions">
            <label for="onlinePlayerCount">최대 플레이어</label>
            <select id="onlinePlayerCount">
              <option value="2">2명</option>
              <option value="3">3명</option>
              <option value="4" selected>4명</option>
            </select>
            <button id="startOnlineGame" type="button">온라인 게임 시작</button>
            <button id="leaveRoom" type="button" class="secondary">나가기</button>
            <p id="lobbyMessage">친구에게 방 코드를 공유하세요.</p>
          </div>
        </div>
      </section>

      <section id="table" class="table-screen hidden" aria-live="polite">
        <header class="top-bar">
          <div>
            <span class="eyebrow">라운드</span>
            <strong><span id="roundNumber">1</span>/10</strong>
          </div>
          <div>
            <span class="eyebrow">승리룰</span>
            <strong id="targetNumber" class="target-number">가장 큰 수</strong>
          </div>
          <div>
            <span class="eyebrow">현재 단계</span>
            <strong id="phaseName">1페이즈 숫자</strong>
          </div>
          <div>
            <span class="eyebrow">팟</span>
            <strong><span id="potAmount">0</span>코인</strong>
          </div>
        </header>

        <section class="play-area">
          <div id="players" class="players-grid"></div>
          <aside class="action-panel">
            <aside class="ad-shell compact hidden" data-ad-placement="table" aria-label="광고"></aside>

            <div id="roomPanel" class="room-panel hidden">
              <span class="eyebrow">온라인 방</span>
              <strong id="activeRoomCode">------</strong>
              <button id="copyActiveRoomCode" type="button" class="small-button">코드 복사</button>
            </div>

            <div class="turn-card">
              <span class="eyebrow">진행</span>
              <h2 id="turnTitle">플레이어 1 차례</h2>
              <p id="turnMessage">카드를 확인하고 행동하세요.</p>
            </div>

            <div id="marketPanel" class="market-panel hidden">
              <span class="eyebrow">판매 카드</span>
              <div id="marketCards" class="market-cards"></div>
            </div>

            <div id="betControls" class="bet-controls">
              <label for="betAmount">베팅 코인</label>
              <div class="bet-row">
                <input id="betAmount" type="range" min="0" max="10" value="1" />
                <output id="betValue" for="betAmount">1</output>
              </div>
              <div class="button-row">
                <button id="confirmBet" type="button">베팅</button>
                <button id="foldPlayer" type="button" class="secondary">다이</button>
              </div>
            </div>

            <div id="expressionControls" class="expression-controls hidden">
              <div class="expression-preview" id="expressionPreview">? + ? = ?</div>
              <div id="expressionInputs" class="expression-inputs"></div>
              <button id="submitExpression" type="button">식 확정</button>
            </div>

            <div id="ruleControls" class="rule-controls hidden">
              <label for="nextRuleType">다음 라운드 승리룰</label>
              <select id="nextRuleType">
                <option value="target">1~50 랜덤 숫자에 가장 가까운 사람</option>
                <option value="max">가장 큰 수를 만든 사람</option>
                <option value="min">가장 작은 수를 만든 사람</option>
              </select>
              <button id="confirmRule" type="button">룰 확정하고 다음 라운드</button>
            </div>

            <div id="resultPanel" class="result-panel hidden"></div>
          </aside>
        </section>
      </section>
    </main>

    <script type="module" src="app.js?v=20260524-ads-pub"></script>
  </body>
</html>
